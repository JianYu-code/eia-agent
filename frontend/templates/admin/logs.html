{% extends "base.html" %}
{% block content %}
<div class="flex items-center justify-between mb-3">
  <div>
    <div class="page-title">系统日志</div>
    <div class="page-subtitle">查看上传、审核、下载等关键操作记录</div>
  </div>
  <button class="btn btn-muted" onclick="load()"><i class="fas fa-rotate"></i>刷新</button>
</div>
<div id="logList" style="display:flex;flex-direction:column;gap:10px;"></div>
{% endblock %}
{% block scripts %}
<script>
async function load() {
  try {
    const d = await api('/api/admin/logs');
    const logs = d.logs||[];
    document.getElementById('logList').innerHTML = logs.length
      ? logs.map(l => `<div class="panel" style="padding:12px;">
          <div class="flex items-start justify-between gap-3">
            <div>
              <div class="flex items-center gap-2"><span class="font-semibold" style="color:#0f172a;">${esc(l.action||'info')}</span><span class="badge badge-uploaded">${esc(l.detail?.project_id||'')}</span></div>
              <div class="text-muted text-sm mt-1">${esc(l.detail?.message||l.detail?.filename||'')}</div>
            </div>
            <span class="text-muted text-xs whitespace-nowrap">${esc(l.user||'system')} · ${esc(l.time||'')}</span>
          </div>
        </div>`).join('')
      : '<div class="text-center text-muted p-4"><i class="fas fa-clock" style="font-size:28px;color:var(--accent);display:block;margin-bottom:8px;"></i>暂无日志</div>';
  } catch(e) { document.getElementById('logList').innerHTML = '<span class="text-p0">'+e.message+'</span>'; }
}
function esc(s) { return (s||'').replace(/</g,'&lt;'); }
load();
</script>
{% endblock %}
