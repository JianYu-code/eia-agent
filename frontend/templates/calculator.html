{% extends "base.html" %}
{% block content %}
<div class="page-title">污染源强计算</div>
<div class="page-subtitle">在线计算辅助工具集，按国家标准公式计算各污染源排放量</div>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.19/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.19/dist/katex.min.js"></script>

<div style="display:grid;grid-template-columns:500px minmax(0,1fr);gap:16px;height:calc(100vh - 160px);" id="app">
  <!-- 左侧列 -->
  <div class="panel" style="overflow-y:auto;display:flex;flex-direction:column;">
    <div style="margin-bottom:12px;">
      <div class="flex items-center gap-2 mb-2">
        <input class="input" id="searchInput" placeholder="搜索公式..." style="max-width:240px;" oninput="renderList()">
        <select class="input" id="catFilter" onchange="renderList()" style="max-width:160px;">
          <option value="">全部分类</option>
        </select>
      </div>
    </div>
    <div id="formulaList" style="display:flex;flex-direction:column;gap:6px;flex:1;overflow-y:auto;"></div>
  </div>

  <!-- 右侧详情 -->
  <div class="panel" id="detailPanel" style="overflow-y:auto;">
    <div style="display:grid;place-items:center;min-height:100%;color:var(--muted);">
      <div style="text-align:center;">
        <i class="fas fa-calculator" style="font-size:36px;color:var(--accent);margin-bottom:12px;"></i>
        <div>点击左侧公式卡片查看详情</div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
const FORMULAS = [{
  id:'so2_coal', cat:'燃料燃烧废气', n:'燃煤锅炉 SO₂', law:'HJ 984 / 物料衡算法',
  latex:'G_{\\text{SO}_2} = 2 \\times B \\times S \\times (1-\\eta)',
  desc:'S=收到基硫分(%), B=耗煤量(t/a), η=脱硫效率(%)',
  vars:[{s:'B',n:'耗煤量',u:'t/a',v:'2000'},{s:'S',n:'硫分 Sar',u:'%',v:'0.8'},{s:'eta',n:'脱硫效率',u:'%',v:'90'}],
  calc:v=>2*v.B*v.S/100*(1-v.eta/100).toFixed(4), unit:'t/a'
},{
  id:'pm_coal', cat:'燃料燃烧废气', n:'燃煤锅炉 烟尘', law:'HJ 984',
  latex:'G_{\\text{PM}} = \\frac{B \\times A \\times d_{fh} \\times (1-\\eta)}{1 - C_{fh}}',
  desc:'A=灰分(%), d_fh=飞灰比(15-40%), C_fh=飞灰含碳量(%)',
  vars:[{s:'B',n:'耗煤量',u:'t/a',v:'2000'},{s:'A',n:'灰分 Aar',u:'%',v:'15'},{s:'dfh',n:'飞灰比',u:'%',v:'15'},{s:'Cfh',n:'飞灰含碳',u:'%',v:'15'},{s:'eta',n:'除尘效率',u:'%',v:'99.5'}],
  calc:v=>(v.B*v.A/100*v.dfh/100*(1-v.eta/100)/(1-v.Cfh/100)).toFixed(4), unit:'t/a'
},{
  id:'nox_coal', cat:'燃料燃烧废气', n:'燃煤锅炉 NOx', law:'HJ 984',
  latex:'G_{\\text{NO}_x} = B \\times K_{\\text{NO}_x} \\times 10^{-3} \\times (1-\\eta)',
  desc:'K=产污系数(kg/t煤), η=脱硝效率',
  vars:[{s:'B',n:'耗煤量',u:'t/a',v:'2000'},{s:'K',n:'NOx系数',u:'kg/t',v:'3.5'},{s:'eta',n:'脱硝效率',u:'%',v:'40'}],
  calc:v=>(v.B*v.K*0.001*(1-v.eta/100)).toFixed(4), unit:'t/a'
},{
  id:'hg_coal', cat:'燃料燃烧废气', n:'燃煤锅炉 汞', law:'GB 13223',
  latex:'G_{\\text{Hg}} = B \\times C_{\\text{Hg}} \\times 10^{-6} \\times (1-\\eta)',
  vars:[{s:'B',n:'耗煤量',u:'t/a',v:'2000'},{s:'CHg',n:'汞含量',u:'mg/kg',v:'0.15'},{s:'eta',n:'去除效率',u:'%',v:'70'}],
  calc:v=>(v.B*v.CHg*1e-6*(1-v.eta/100)).toFixed(6), unit:'t/a'
},{
  id:'so2_bio', cat:'燃料燃烧废气', n:'生物质锅炉 SO₂', law:'HJ 984',
  latex:'G_{\\text{SO}_2} = 2 \\times B \\times S \\times (1-\\eta)',
  vars:[{s:'B',n:'燃料量',u:'t/a',v:'1500'},{s:'S',n:'硫分',u:'%',v:'0.05'},{s:'eta',n:'脱硫效率',u:'%',v:'0'}],
  calc:v=>(2*v.B*v.S/100*(1-v.eta/100)).toFixed(4), unit:'t/a'
},{
  id:'pm_bio', cat:'燃料燃烧废气', n:'生物质锅炉 烟尘', law:'HJ 984',
  latex:'G_{\\text{PM}} = \\frac{B \\times A \\times d_{fh} \\times (1-\\eta)}{1 - C_{fh}}',
  vars:[{s:'B',n:'燃料量',u:'t/a',v:'1500'},{s:'A',n:'灰分',u:'%',v:'3'},{s:'dfh',n:'飞灰比',u:'%',v:'20'},{s:'Cfh',n:'飞灰含碳',u:'%',v:'10'},{s:'eta',n:'除尘效率',u:'%',v:'99.5'}],
  calc:v=>(v.B*v.A/100*v.dfh/100*(1-v.eta/100)/(1-v.Cfh/100)).toFixed(4), unit:'t/a'
},{
  id:'nox_gas', cat:'燃料燃烧废气', n:'天然气锅炉 NOx', law:'产排污系数',
  latex:'G_{\\text{NO}_x} = Q \\times K_{\\text{NO}_x} \\times 10^{-3} \\times (1-\\eta)',
  vars:[{s:'Q',n:'用气量',u:'万m³/a',v:'500'},{s:'K',n:'NOx系数',u:'kg/万m³',v:'18.7'},{s:'eta',n:'脱硝效率',u:'%',v:'0'}],
  calc:v=>(v.Q*v.K*0.001*(1-v.eta/100)).toFixed(4), unit:'t/a'
},{
  id:'vocs_org', cat:'工艺废气', n:'有组织 VOCs', law:'物料衡算',
  latex:'G_{\\text{VOCs}} = Q \\times C \\times t \\times 10^{-9}',
  vars:[{s:'Q',n:'排气量',u:'m³/h',v:'10000'},{s:'C',n:'浓度',u:'mg/m³',v:'30'},{s:'t',n:'年运行',u:'h/a',v:'4800'}],
  calc:v=>(v.Q*v.C*v.t*1e-9).toFixed(4), unit:'t/a'
},{
  id:'vocs_fug', cat:'工艺废气', n:'无组织 VOCs（系数法）', law:'产排污系数',
  latex:'G = M \\times k \\times 10^{-3} \\times (1-\\eta)',
  vars:[{s:'M',n:'原料用量',u:'t/a',v:'50'},{s:'k',n:'排放系数',u:'kg/t',v:'25'},{s:'eta',n:'收集效率',u:'%',v:'90'}],
  calc:v=>(v.M*v.k*0.001*(1-v.eta/100)).toFixed(4), unit:'t/a'
},{
  id:'dust_load', cat:'堆场扬尘', n:'装卸起尘', law:'HJ 2.2 附录 C',
  latex:'G = 0.0016 \\times (U/2.2)^3 \\times (1-M) \\times H^{1.3} \\times T',
  vars:[{s:'T',n:'装卸量',u:'t/a',v:'5000'},{s:'U',n:'风速',u:'m/s',v:'2.5'},{s:'M',n:'含水率',u:'%',v:'5'},{s:'H',n:'落差',u:'m',v:'2'}],
  calc:v=>(0.0016*Math.pow(v.U/2.2,3)*(1-v.M/100)*Math.pow(v.H,1.3)*v.T).toFixed(4), unit:'t/a'
},{
  id:'road_dust', cat:'堆场扬尘', n:'道路扬尘', law:'HJ 2.2',
  latex:'G = e \\times L \\times N \\times (1-\\eta) \\times 10^{-6}',
  vars:[{s:'e',n:'排放因子',u:'g/(km·辆)',v:'0.2'},{s:'L',n:'单程距离',u:'km',v:'0.5'},{s:'N',n:'年车次',u:'次/a',v:'10000'},{s:'eta',n:'洒水效率',u:'%',v:'80'}],
  calc:v=>(v.e*v.L*v.N*1e-6*(1-v.eta/100)).toFixed(4), unit:'t/a'
},{
  id:'ww_gen', cat:'废水', n:'废水污染物', law:'排污系数法',
  latex:'G = Q \\times C \\times 10^{-6}',
  vars:[{s:'Q',n:'排放量',u:'m³/a',v:'5000'},{s:'C_COD',n:'COD浓度',u:'mg/L',v:'300'},{s:'C_NH3',n:'氨氮浓度',u:'mg/L',v:'25'},{s:'C_SS',n:'SS浓度',u:'mg/L',v:'100'}],
  calc:v=>[['COD',(v.Q*v.C_COD*1e-6).toFixed(3)],['氨氮',(v.Q*v.C_NH3*1e-6).toFixed(3)],['SS',(v.Q*v.C_SS*1e-6).toFixed(3)]], mu:['COD','氨氮','SS'], unit:'t/a'
},{
  id:'ash_slag', cat:'固体废物', n:'灰渣产生量', law:'物料衡算',
  latex:'G_{\\text{灰渣}} = B \\times (A - d_{fh}A)/(1-C_{fh}) + G_{\\text{脱硫}}',
  vars:[{s:'B',n:'耗煤量',u:'t/a',v:'2000'},{s:'A',n:'灰分',u:'%',v:'15'},{s:'dfh',n:'飞灰比',u:'%',v:'15'},{s:'Cfh',n:'飞灰含碳',u:'%',v:'15'},{s:'Gd',n:'脱硫副产物',u:'t/a',v:'50'}],
  calc:v=>(v.B*(v.A/100-v.A/100*v.dfh/100)/(1-v.Cfh/100)+v.Gd).toFixed(1), unit:'t/a'
},{
  id:'sludge', cat:'固体废物', n:'污泥产生量', law:'HJ 884',
  latex:'G = Q \\times (C_1 - C_2) \\times 10^{-6} \\div S',
  vars:[{s:'Q',n:'处理水量',u:'m³/a',v:'5000'},{s:'C1',n:'进水SS',u:'mg/L',v:'200'},{s:'C2',n:'出水SS',u:'mg/L',v:'10'},{s:'S',n:'固含率',u:'%',v:'2'}],
  calc:v=>(v.Q*(v.C1-v.C2)*1e-6/(v.S/100)).toFixed(2), unit:'t/a'
},{
  id:'noise_add', cat:'噪声', n:'噪声叠加', law:'HJ 2.4',
  latex:'L_{\\text{总}} = 10 \\lg\\left( \\sum 10^{L_i/10} \\right)',
  vars:[{s:'L1',n:'声源1',u:'dB(A)',v:'85'},{s:'L2',n:'声源2',u:'dB(A)',v:'80'},{s:'L3',n:'声源3',u:'dB(A)',v:'78'}],
  calc:v=>(10*Math.log10(Math.pow(10,v.L1/10)+Math.pow(10,v.L2/10)+Math.pow(10,v.L3/10))).toFixed(1), unit:'dB(A)'
},{
  id:'noise_dist', cat:'噪声', n:'距离衰减', law:'HJ 2.4',
  latex:'L_2 = L_1 - 20 \\lg(r_2/r_1) - A',
  vars:[{s:'L1',n:'源强',u:'dB(A)',v:'90'},{s:'r1',n:'源距离',u:'m',v:'1'},{s:'r2',n:'预测距离',u:'m',v:'50'},{s:'A',n:'附加衰减',u:'dB',v:'8'}],
  calc:v=>(v.L1-20*Math.log10(v.r2/v.r1)-v.A).toFixed(1), unit:'dB(A)'
}];

let selectedId = null;
let catFilters = [];

function init() {
  catFilters = [...new Set(FORMULAS.map(f=>f.cat))];
  document.getElementById('catFilter').innerHTML = '<option value="">全部分类</option>' +
    catFilters.map(c=>`<option value="${c}">${c}</option>`).join('');
  renderList();
}

function renderList() {
  const q = (document.getElementById('searchInput')?.value||'').toLowerCase();
  const cat = document.getElementById('catFilter')?.value||'';
  let items = FORMULAS;
  if (q) items = items.filter(f=>f.n.toLowerCase().includes(q)||f.cat.toLowerCase().includes(q)||f.law.toLowerCase().includes(q));
  if (cat) items = items.filter(f=>f.cat===cat);

  let html = '';
  let lastCat = '';
  for (const f of items) {
    if (f.cat !== lastCat) {
      html += `<div style="font-size:11px;color:var(--muted);padding:8px 4px 4px;font-weight:800;text-transform:uppercase;">${f.cat}</div>`;
      lastCat = f.cat;
    }
    html += `<div class="panel-soft" style="padding:10px;cursor:pointer;${f.id===selectedId?'border:1px solid var(--accent);background:#f0fdfa;':''}" onclick="selectFormula('${f.id}')">
      <div style="font-size:13px;font-weight:700;color:#0f172a;">${f.n}</div>
      <div class="text-muted text-xs mt-1">${f.law}</div>
    </div>`;
  }
  if (!items.length) html = '<div class="text-muted text-sm text-center p-4">未找到匹配的公式</div>';
  document.getElementById('formulaList').innerHTML = html;
}

function selectFormula(id) {
  selectedId = id;
  renderList();
  const f = FORMULAS.find(x=>x.id===id);
  if (!f) return;

  let latexHtml = '';
  try { latexHtml = katex.renderToString(f.latex, {displayMode:true}); } catch(e) { latexHtml = f.latex; }

  let varHtml = f.vars.map(inp => `<tr>
    <td style="font-weight:600;font-size:13px;">${inp.n}</td>
    <td style="font-family:monospace;color:var(--accent-dark);">${inp.s}</td>
    <td><input class="input" id="dv_${inp.s}" type="number" step="any" value="${inp.v}" style="width:100%;min-height:32px;font-size:13px;"></td>
    <td class="text-muted text-xs">${inp.u}</td>
  </tr>`).join('');

  document.getElementById('detailPanel').innerHTML = `
    <div style="margin-bottom:12px;">
      <span class="badge badge-uploaded mb-2">${f.cat}</span>
      <div class="text-muted text-xs mt-2">依据：${f.law}</div>
    </div>
    <div class="font-semibold mb-3" style="font-size:18px;color:#0f172a;">${f.n}</div>
    <div class="panel-soft" style="padding:16px;margin-bottom:16px;text-align:center;overflow-x:auto;">${latexHtml}</div>
    ${f.desc ? `<div class="text-muted text-sm mb-2">${f.desc}</div>` : ''}
    <table class="table" style="margin-bottom:12px;">
      <thead><tr><th>变量名</th><th>符号</th><th>输入值</th><th>单位</th></tr></thead>
      <tbody>${varHtml}</tbody>
    </table>
    <button class="btn btn-primary" onclick="doCalc()"><i class="fas fa-calculator"></i> 计算</button>
    <div id="calcResult" class="mt-3"></div>`;
}

function doCalc() {
  const f = FORMULAS.find(x=>x.id===selectedId);
  if (!f) return;
  const vals = {};
  for (const inp of f.vars) {
    vals[inp.s] = parseFloat(document.getElementById('dv_'+inp.s)?.value) || 0;
  }
  const result = f.calc(vals);
  let html = '<table class="table"><thead><tr><th>项目</th><th>结果</th><th>单位</th></tr></thead><tbody>';
  if (Array.isArray(result)) {
    for (const r of result) {
      html += `<tr><td style="font-weight:600;">${r[0]}</td><td style="font-weight:700;color:var(--accent-dark);">${r[1]}</td><td>${f.unit||'t/a'}</td></tr>`;
    }
  } else {
    html += `<tr><td style="font-weight:600;">${f.n}</td><td style="font-weight:700;color:var(--accent-dark);">${result}</td><td>${f.unit||'t/a'}</td></tr>`;
  }
  html += '</tbody></table>';
  document.getElementById('calcResult').innerHTML = html;
}

init();
</script>
{% endblock %}
