{% extends "base.html" %}
{% block content %}
<div class="page-title">污染源强计算</div>
<div class="page-subtitle">在线计算辅助工具集，按国家标准公式计算各污染源排放量</div>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.19/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.19/dist/katex.min.js"></script>

<div style="display:grid;grid-template-columns:500px minmax(0,1fr);gap:16px;height:calc(100vh - 160px);" id="app">
  <div class="panel" style="overflow-y:auto;display:flex;flex-direction:column;">
    <div class="flex items-center gap-2 mb-2">
      <input class="input" id="searchInput" placeholder="搜索公式..." style="max-width:240px;" oninput="renderList()">
      <select class="input" id="catFilter" onchange="renderList()" style="max-width:160px;"><option value="">全部分类</option></select>
    </div>
    <div id="formulaList" style="flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:4px;"></div>
  </div>
  <div class="panel" id="detailPanel" style="overflow-y:auto;">
    <div style="display:grid;place-items:center;min-height:100%;color:var(--muted);text-align:center;">
      <i class="fas fa-calculator" style="font-size:36px;color:var(--accent);margin-bottom:12px;"></i>
      <div>点击左侧公式卡片查看详情</div>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
const FORMULAS = [
// === 源强核算-大气 ===
{id:'so2_coal',cat:'源强核算-大气',n:'二氧化硫产生量',law:'HJ 984',latex:'G_{\\text{SO}_2}=2BS',vars:[{s:'B',n:'耗煤量',u:'t/a',v:'2000'},{s:'S',n:'硫分Sar',u:'%',v:'0.8'}],calc:v=>2*v.B*v.S/100,unit:'t/a',desc:'S=收到基硫分(%)'},
{id:'co_prod',cat:'源强核算-大气',n:'一氧化碳产生量',law:'物料衡算',latex:'G_{\\text{CO}}=2330qCQ',vars:[{s:'q',n:'燃料消耗量',u:'t/a',v:'2000'},{s:'C',n:'碳含量',u:'%',v:'60'},{s:'Q',n:'燃烧效率',u:'%',v:'95'}],calc:v=>2330*v.q*v.C/100*v.Q/100*1e-6,unit:'t/a'},
{id:'eq_stack_h',cat:'源强核算-大气',n:'等效排气筒高度',law:'HJ 2.2',latex:'h=\\sqrt{\\frac{1}{2}(h_1^2+h_2^2)}',vars:[{s:'h1',n:'排气筒1高度',u:'m',v:'30'},{s:'h2',n:'排气筒2高度',u:'m',v:'25'}],calc:v=>Math.sqrt((v.h1*v.h1+v.h2*v.h2)/2),unit:'m'},
{id:'eq_stack_q',cat:'源强核算-大气',n:'等效排气筒某污染物排放速率',law:'HJ 2.2',latex:'Q=Q_1+Q_2',vars:[{s:'Q1',n:'排气筒1速率',u:'kg/h',v:'10'},{s:'Q2',n:'排气筒2速率',u:'kg/h',v:'8'}],calc:v=>v.Q1+v.Q2,unit:'kg/h'},
{id:'extrap_high',cat:'源强核算-大气',n:'外推法(高于最高值)',law:'HJ 2.2',latex:'Q=Q_b\\left(\\frac{h}{h_b}\\right)^2',vars:[{s:'Qb',n:'已知排放速率',u:'kg/h',v:'15'},{s:'h',n:'排气筒高度',u:'m',v:'35'},{s:'hb',n:'已知排气筒高度',u:'m',v:'30'}],calc:v=>v.Qb*Math.pow(v.h/v.hb,2),unit:'kg/h'},
{id:'extrap_low',cat:'源强核算-大气',n:'外推法(低于最低值)',law:'HJ 2.2',latex:'Q=Q_c\\left(\\frac{h}{h_c}\\right)^2',vars:[{s:'Qc',n:'已知排放速率',u:'kg/h',v:'5'},{s:'h',n:'排气筒高度',u:'m',v:'15'},{s:'hc',n:'最低排气筒高度',u:'m',v:'20'}],calc:v=>v.Qc*Math.pow(v.h/v.hc,2),unit:'kg/h'},
{id:'interpolate',cat:'源强核算-大气',n:'内插法',law:'HJ 2.2',latex:'Q=Q_a+(Q_{a+1}-Q_a)\\frac{h-h_a}{h_{a+1}-h_a}',vars:[{s:'Qa',n:'下界排放速率',u:'kg/h',v:'5'},{s:'Qa1',n:'上界排放速率',u:'kg/h',v:'15'},{s:'h',n:'目标高度',u:'m',v:'25'},{s:'ha',n:'下界高度',u:'m',v:'20'},{s:'ha1',n:'上界高度',u:'m',v:'30'}],calc:v=>v.Qa+(v.Qa1-v.Qa)*(v.h-v.ha)/(v.ha1-v.ha),unit:'kg/h'},

// === 风量计算 ===
{id:'air_rect',cat:'风量计算',n:'风量计算(矩形)',law:'HJ 984',latex:'L=v\\times F\\times\\beta\\times3600,\\ F=a\\times b',vars:[{s:'v',n:'断面风速',u:'m/s',v:'0.5'},{s:'a',n:'宽度',u:'m',v:'0.8'},{s:'b',n:'高度',u:'m',v:'0.6'},{s:'b2',n:'漏风系数β',u:'',v:'1.1'}],calc:v=>v.v*v.a*v.b*v.b2*3600,unit:'m³/h'},
{id:'air_round',cat:'风量计算',n:'风量计算(圆形)',law:'HJ 984',latex:'L=v\\times F\\times\\beta\\times3600,\\ F=\\pi r^2',vars:[{s:'v',n:'断面风速',u:'m/s',v:'0.5'},{s:'r',n:'管道半径',u:'m',v:'0.3'},{s:'b2',n:'漏风系数β',u:'',v:'1.1'}],calc:v=>v.v*Math.PI*v.r*v.r*v.b2*3600,unit:'m³/h'},
{id:'stack_diam',cat:'风量计算',n:'排气筒内径',law:'物料衡算',latex:'r=(V\\div3600\\div v\\div\\pi)^{0.5}\\times2',vars:[{s:'V',n:'风量',u:'m³/h',v:'10000'},{s:'v',n:'出口流速',u:'m/s',v:'15'}],calc:v=>Math.sqrt(v.V/3600/v.v/Math.PI)*2,unit:'m'},

// === 水量计算 ===
{id:'init_rain',cat:'水量计算',n:'初期雨水',law:'HJ 2.3',latex:'Q=q\\times s\\times t\\times\\Psi',vars:[{s:'q',n:'暴雨强度',u:'L/(s·ha)',v:'200'},{s:'s',n:'汇水面积',u:'ha',v:'1'},{s:'t',n:'降雨历时',u:'min',v:'15'},{s:'psi',n:'径流系数Ψ',u:'',v:'0.7'}],calc:v=>v.q*v.s*v.t*60*0.001*v.psi,unit:'m³'},
{id:'wash_water',cat:'水量计算',n:'小时清洗用水量计算（连续逆流清洗法）',law:'GB 50136-2011',latex:'q_1=d\\sqrt[n]{\\frac{C_0S}{C_n}}',vars:[{s:'d',n:'镀液带出量',u:'L/h',v:'10'},{s:'C0',n:'镀液金属离子浓度',u:'mg/L',v:'50000'},{s:'Cn',n:'废水金属离子浓度',u:'mg/L',v:'50'},{s:'S',n:'浓度修正系数',u:'',v:'1.2'},{s:'n',n:'清洗槽级数',u:'',v:'3'}],calc:v=>v.d*Math.pow(v.C0*v.S/v.Cn,1/v.n),unit:'L/h'},
{id:'elec_vol',cat:'水量计算',n:'电解槽有效容积计算',law:'物料衡算',latex:'V=\\frac{Qt}{60}',vars:[{s:'Q',n:'废水流量',u:'m³/h',v:'5'},{s:'t',n:'停留时间',u:'min',v:'30'}],calc:v=>v.Q*v.t/60,unit:'m³'},
{id:'current_calc',cat:'水量计算',n:'电流计算',law:'物料衡算',latex:'I=\\frac{nK_{Cr}QC}{K_C}',vars:[{s:'n',n:'电解槽数',u:'',v:'1'},{s:'KCr',n:'铬还原系数',u:'',v:'3'},{s:'Q',n:'流量',u:'m³/h',v:'5'},{s:'C',n:'Cr⁶⁺浓度',u:'mg/L',v:'100'},{s:'Kc',n:'电流系数',u:'',v:'1.2'}],calc:v=>v.n*v.KCr*v.Q*v.C/v.Kc,unit:'A'},
{id:'plate_area',cat:'水量计算',n:'极板面积计算',law:'物料衡算',latex:'F=\\frac{I}{\\alpha M_1M_2J_F}',vars:[{s:'I',n:'电流',u:'A',v:'100'},{s:'alpha',n:'系数α',u:'',v:'1.1'},{s:'M1',n:'系数M₁',u:'',v:'1'},{s:'M2',n:'系数M₂',u:'',v:'1'},{s:'JF',n:'电流密度',u:'A/m²',v:'50'}],calc:v=>v.I/(v.alpha*v.M1*v.M2*v.JF),unit:'m²'},
{id:'volt_calc',cat:'水量计算',n:'电压计算',law:'物料衡算',latex:'U=nU_1+U_2',vars:[{s:'n',n:'槽数',u:'',v:'1'},{s:'U1',n:'单槽极间电压',u:'V',v:'4'},{s:'U2',n:'导体电压降',u:'V',v:'2'}],calc:v=>v.n*v.U1+v.U2,unit:'V'},
{id:'volt_drop',cat:'水量计算',n:'极间电压降计算',law:'物料衡算',latex:'U_1=a+bJ_F',vars:[{s:'a',n:'系数a',u:'V',v:'1.5'},{s:'b',n:'系数b',u:'',v:'0.03'},{s:'JF',n:'电流密度',u:'A/m²',v:'50'}],calc:v=>v.a+v.b*v.JF,unit:'V'},
{id:'space_v',cat:'水量计算',n:'空间流速计算',law:'物料衡算',latex:'\\mu=\\frac{1000E}{CT}',vars:[{s:'E',n:'电流效率',u:'',v:'0.85'},{s:'C',n:'浓度',u:'mg/L',v:'100'},{s:'T',n:'温度系数',u:'',v:'1'}],calc:v=>1000*v.E/(v.C*v.T),unit:'L/(A·h)'},
{id:'flow_speed',cat:'水量计算',n:'流速计算',law:'物料衡算',latex:'v=\\mu H',vars:[{s:'mu',n:'空间流速',u:'L/(A·h)',v:'8.5'},{s:'H',n:'树脂层高度',u:'m',v:'1.5'}],calc:v=>v.mu*v.H,unit:'m/h'},
{id:'resin_col_d',cat:'水量计算',n:'交换柱直径计算',law:'物料衡算',latex:'D=2\\sqrt{\\frac{Q}{\\pi v}}',vars:[{s:'Q',n:'设计流量',u:'m³/h',v:'5'},{s:'v',n:'流速',u:'m/h',v:'10'}],calc:v=>2*Math.sqrt(v.Q/(Math.PI*v.v)),unit:'m'},
{id:'resin_vol',cat:'水量计算',n:'阴(阳)离子交换树脂单柱体积计算',law:'物料衡算',latex:'V=\\frac{Q}{\\mu}\\times1000',vars:[{s:'Q',n:'设计流量',u:'m³/h',v:'5'},{s:'mu',n:'空间流速',u:'L/(A·h)',v:'8.5'}],calc:v=>v.Q/v.mu*1000,unit:'L'},
{id:'sludge_chem',cat:'水量计算',n:'化学法处理后废水中的污泥浓度计算',law:'物料衡算',latex:'C_{js}=KC_1+2C_2+1.7C_3+C_{SS}',vars:[{s:'K',n:'系数',u:'',v:'1.5'},{s:'C1',n:'重金属浓度',u:'mg/L',v:'100'},{s:'C2',n:'Ca²⁺浓度',u:'mg/L',v:'200'},{s:'C3',n:'Mg²⁺浓度',u:'mg/L',v:'50'},{s:'CSS',n:'SS浓度',u:'mg/L',v:'150'}],calc:v=>v.K*v.C1+2*v.C2+1.7*v.C3+v.CSS,unit:'mg/L'},
{id:'chem_clean',cat:'水量计算',n:'化学清洗槽有效容积计算',law:'物料衡算',latex:'V=\\frac{dC_0ATm}{C_R}',vars:[{s:'d',n:'镀液带出量',u:'L/h',v:'10'},{s:'C0',n:'初始浓度',u:'mg/L',v:'50000'},{s:'A',n:'面积',u:'m²',v:'10'},{s:'Tm',n:'清洗周期',u:'h',v:'8'},{s:'CR',n:'再生前浓度',u:'mg/L',v:'5000'}],calc:v=>v.d*v.C0*v.A*v.Tm/v.CR,unit:'L'},
{id:'cu_deposit',cat:'水量计算',n:'电解槽阴极析出铜量计算',law:'物料衡算',latex:'M_X=IK\\eta',vars:[{s:'I',n:'电流',u:'A',v:'100'},{s:'K',n:'铜电化当量',u:'g/(A·h)',v:'1.186'},{s:'eta',n:'电流效率',u:'%',v:'85'}],calc:v=>v.I*v.K*v.eta/100,unit:'g/h'},
{id:'ag_deposit',cat:'水量计算',n:'电解槽阴极析出银量计算',law:'物料衡算',latex:'M_X=IK\\eta',vars:[{s:'I',n:'电流',u:'A',v:'100'},{s:'K',n:'银电化当量',u:'g/(A·h)',v:'4.025'},{s:'eta',n:'电流效率',u:'%',v:'85'}],calc:v=>v.I*v.K*v.eta/100,unit:'g/h'},
{id:'ag_cyanide',cat:'水量计算',n:'银(或氰)离子的带出量计算（电解处理法）',law:'物料衡算',latex:'d=\\frac{C_0Sq}{1000}',vars:[{s:'C0',n:'初始浓度',u:'mg/L',v:'1000'},{s:'S',n:'面积',u:'m²',v:'10'},{s:'q',n:'单位带出量',u:'L/m²',v:'0.5'}],calc:v=>v.C0*v.S*v.q/1000,unit:'g'},
{id:'cu_ion',cat:'水量计算',n:'铜离子带出量计算（电解处理法）',law:'物料衡算',latex:'d=\\frac{C_0Ad_A}{1000}',vars:[{s:'C0',n:'初始浓度',u:'mg/L',v:'1000'},{s:'A',n:'面积',u:'m²',v:'10'},{s:'dA',n:'单位面积带出量',u:'L/m²',v:'0.3'}],calc:v=>v.C0*v.A*v.dA/1000,unit:'g'},
{id:'elec_power',cat:'水量计算',n:'电能消耗计算',law:'物料衡算',latex:'N=\\frac{IU}{1000Q\\eta}',vars:[{s:'I',n:'电流',u:'A',v:'100'},{s:'U',n:'电压',u:'V',v:'6'},{s:'Q',n:'处理流量',u:'m³/h',v:'5'},{s:'eta',n:'效率',u:'',v:'0.85'}],calc:v=>v.I*v.U/(1000*v.Q*v.eta),unit:'kW·h/m³'},
{id:'fe_consume',cat:'水量计算',n:'铸铁屑消耗速率（内电解法处理电镀废水）',law:'物料衡算',latex:'V_t=Q_d(1.1C_1+0.9C_i+2.8\\times10^{4-pH})',vars:[{s:'Qd',n:'设计流量',u:'m³/d',v:'50'},{s:'C1',n:'初始COD',u:'mg/L',v:'500'},{s:'Ci',n:'初始色度',u:'倍',v:'200'},{s:'pH',n:'pH值',u:'',v:'3'}],calc:v=>v.Qd*(1.1*v.C1+0.9*v.Ci+2.8*Math.pow(10,4-v.pH)),unit:'g/d'},
{id:'ultrasonic',cat:'水量计算',n:'超声波清洗法',law:'物料衡算',latex:'\\omega=\\frac{A}{P}',vars:[{s:'A',n:'超声波功率',u:'W',v:'500'},{s:'P',n:'清洗槽面积',u:'m²',v:'0.5'}],calc:v=>v.A/v.P,unit:'W/m²'},
{id:'resin_loss',cat:'水量计算',n:'废水通过树脂层的水头损失计算',law:'物料衡算',latex:'\\Delta P=K\\cdot\\frac{v\\cdot V\\cdot H}{d_{cp}^2}',vars:[{s:'K',n:'系数',u:'',v:'1.2'},{s:'v',n:'流速',u:'m/h',v:'10'},{s:'V',n:'体积',u:'m³',v:'2'},{s:'H',n:'树脂层高',u:'m',v:'1.5'},{s:'dcp',n:'粒径',u:'mm',v:'0.8'}],calc:v=>v.K*v.v*v.V*v.H/(v.dcp*v.dcp),unit:'m'},

// === 噪声预测 ===
{id:'geo_div',cat:'噪声预测',n:'几何发散引起的衰减',law:'HJ 2.4',latex:'A_{div}=10\\lg(r/r_0)',vars:[{s:'r',n:'预测距离',u:'m',v:'100'},{s:'r0',n:'参考距离',u:'m',v:'1'}],calc:v=>10*Math.log10(v.r/v.r0),unit:'dB(A)'},
{id:'noise_pred',cat:'噪声预测',n:'噪声预测值',law:'HJ 2.4',latex:'L_{eq}=10\\lg(10^{0.1L_{eqg}}+10^{0.1L_{eqb}})',vars:[{s:'Leqg',n:'贡献值',u:'dB(A)',v:'65'},{s:'Leqb',n:'背景值',u:'dB(A)',v:'55'}],calc:v=>10*Math.log10(Math.pow(10,0.1*v.Leqg)+Math.pow(10,0.1*v.Leqb)),unit:'dB(A)'},
{id:'outdoor_geo',cat:'噪声预测',n:'户外声传播的衰减（只考虑几何发散衰减）',law:'HJ 2.4',latex:'L_A(r)=L_A(r_0)-A_{div}',vars:[{s:'LA0',n:'r₀处声级',u:'dB(A)',v:'90'},{s:'r',n:'预测距离',u:'m',v:'50'},{s:'r0',n:'源距离',u:'m',v:'1'}],calc:v=>v.LA0-10*Math.log10(v.r/v.r0),unit:'dB(A)'},
{id:'point_div',cat:'噪声预测',n:'点声源的几何发散衰减',law:'HJ 2.4',latex:'A_{div}=20\\lg(r/r_0)',vars:[{s:'r',n:'预测距离',u:'m',v:'50'},{s:'r0',n:'参考距离',u:'m',v:'1'}],calc:v=>20*Math.log10(v.r/v.r0),unit:'dB'},
{id:'point_a5_11',cat:'噪声预测',n:'无指向性点声源几何发散衰减（A.5等效式）',law:'HJ 2.4',latex:'L_A(r)=L_{Aw}-20\\lg r-11',vars:[{s:'LAw',n:'声功率级',u:'dB(A)',v:'100'},{s:'r',n:'预测距离',u:'m',v:'50'}],calc:v=>v.LAw-20*Math.log10(v.r)-11,unit:'dB(A)'},
{id:'point_a5_8',cat:'噪声预测',n:'无指向性点声源几何发散衰减（A.5等效式）',law:'HJ 2.4',latex:'L_A(r)=L_{Aw}-20\\lg r-8',vars:[{s:'LAw',n:'声功率级',u:'dB(A)',v:'100'},{s:'r',n:'预测距离',u:'m',v:'50'}],calc:v=>v.LAw-20*Math.log10(v.r)-8,unit:'dB(A)'},
{id:'inf_line',cat:'噪声预测',n:'无限长线声源几何发散衰减',law:'HJ 2.4',latex:'L_P(r)=L_P(r_0)-10\\lg(r/r_0)',vars:[{s:'LP0',n:'r₀处声级',u:'dB(A)',v:'85'},{s:'r',n:'预测距离',u:'m',v:'50'},{s:'r0',n:'源距离',u:'m',v:'1'}],calc:v=>v.LP0-10*Math.log10(v.r/v.r0),unit:'dB(A)'},
{id:'dir_point',cat:'噪声预测',n:'指向性点声源几何发散衰减',law:'HJ 2.4',latex:'L_p(r)_\\theta=L_w-20\\lg(r)+D_{I\\theta}-11',vars:[{s:'Lw',n:'声功率级',u:'dB(A)',v:'100'},{s:'r',n:'距离',u:'m',v:'50'},{s:'DI',n:'指向性指数',u:'dB',v:'3'}],calc:v=>v.Lw-20*Math.log10(v.r)+v.DI-11,unit:'dB(A)'},
{id:'basic_out',cat:'噪声预测',n:'户外声传播的衰减（基本公式）',law:'HJ 2.4',latex:'L_P(r)=L_p(r_0)+D_C-(A_{div}+A_{atm}+A_{gr}+A_{bar}+A_{misc})',vars:[{s:'Lpr0',n:'参考声级',u:'dB(A)',v:'90'},{s:'DC',n:'指向性修正',u:'dB',v:'0'},{s:'Adiv',n:'几何发散',u:'dB',v:'34'},{s:'Aatm',n:'大气吸收',u:'dB',v:'2'},{s:'Agr',n:'地面效应',u:'dB',v:'1'},{s:'Abar',n:'屏障衰减',u:'dB',v:'0'},{s:'Am',n:'其他衰减',u:'dB',v:'0'}],calc:v=>v.Lpr0+v.DC-(v.Adiv+v.Aatm+v.Agr+v.Abar+v.Am),unit:'dB(A)'},
{id:'indoor_out',cat:'噪声预测',n:'室内声源等效室外声源声功率级计算方法',law:'HJ 2.4',latex:'L_{p2}=L_{p1}-(TL+6)',vars:[{s:'Lp1',n:'室内声级',u:'dB(A)',v:'95'},{s:'TL',n:'隔声量',u:'dB',v:'25'}],calc:v=>v.Lp1-(v.TL+6),unit:'dB(A)'},
{id:'out_wall',cat:'噪声预测',n:'靠近室外围护结构处声压级计算',law:'HJ 2.4',latex:'L_{p2i}(T)=L_{p1i}(T)-(TL_i+6)',vars:[{s:'Lp1i',n:'室内频带声级',u:'dB',v:'90'},{s:'TLi',n:'频带隔声量',u:'dB',v:'28'}],calc:v=>v.Lp1i-(v.TLi+6),unit:'dB'},
{id:'limit_bar',cat:'噪声预测',n:'有限长薄屏障在点声源声场中引起的衰减',law:'HJ 2.4',latex:'A_{bar}=-10\\lg(\\frac{1}{3+20N_1}+\\frac{1}{3+20N_2}+\\frac{1}{3+20N_3})',vars:[{s:'N1',n:'菲涅尔数1',u:'',v:'1.5'},{s:'N2',n:'菲涅尔数2',u:'',v:'0.8'},{s:'N3',n:'菲涅尔数3',u:'',v:'0.3'}],calc:v=>-10*Math.log10(1/(3+20*v.N1)+1/(3+20*v.N2)+1/(3+20*v.N3)),unit:'dB'},
{id:'top_diff',cat:'噪声预测',n:'顶端绕射衰减（屏障作无限长处理）',law:'HJ 2.4',latex:'A_{bar}=-10\\lg(\\frac{1}{3+20N_1})',vars:[{s:'N1',n:'菲涅尔数',u:'',v:'1.5'}],calc:v=>-10*Math.log10(1/(3+20*v.N1)),unit:'dB'},
{id:'double_diff',cat:'噪声预测',n:'双绕射计算',law:'HJ 2.4',latex:'\\delta=[(d_{ss}+d_{sr}+e)^2+a^2]^{1/2}+d',vars:[{s:'dss',n:'源到第一衍射点',u:'m',v:'10'},{s:'dsr',n:'第一到第二衍射点',u:'m',v:'5'},{s:'e',n:'修正值',u:'m',v:'0.5'},{s:'a',n:'高度差',u:'m',v:'2'},{s:'d',n:'基线距离',u:'m',v:'2'}],calc:v=>Math.sqrt(Math.pow(v.dss+v.dsr+v.e,2)+v.a*v.a)+v.d,unit:'m'},
{id:'atm_att',cat:'噪声预测',n:'大气吸收引起的衰减',law:'HJ 2.4',latex:'A_{atm}=\\frac{\\alpha(r-r_0)}{1000}',vars:[{s:'alpha',n:'大气衰减系数',u:'dB/km',v:'2.5'},{s:'r',n:'预测距离',u:'m',v:'200'},{s:'r0',n:'参考距离',u:'m',v:'1'}],calc:v=>v.alpha*(v.r-v.r0)/1000,unit:'dB'},
{id:'ground_att',cat:'噪声预测',n:'地面效应引起的衰减（疏松地面传播）',law:'HJ 2.4',latex:'A_{gr}=4.8-\\left(\\frac{2h_m}{r}\\right)\\left(17+\\frac{r}{300}\\right)',vars:[{s:'hm',n:'平均传播高度',u:'m',v:'2'},{s:'r',n:'预测距离',u:'m',v:'100'}],calc:v=>4.8-(2*v.hm/v.r)*(17+v.r/300),unit:'dB'},
{id:'trans_sound',cat:'噪声预测',n:'透声面积处等效声源的倍频带声功率级计算',law:'HJ 2.4',latex:'L_w=L_{p2}(T)+10\\lg S',vars:[{s:'Lp2',n:'透声处声压级',u:'dB',v:'70'},{s:'S',n:'透声面积',u:'m²',v:'5'}],calc:v=>v.Lp2+10*Math.log10(v.S),unit:'dB'},
{id:'total_flow',cat:'噪声预测',n:'总车流等效声级',law:'HJ 2.4',latex:'L_{eq}=10\\lg[10^{0.1L_{eq(h)\\text{大}}}+10^{0.1L_{eq(h)\\text{中}}}+10^{0.1L_{eq(h)\\text{小}}}]',vars:[{s:'Lbig',n:'大型车贡献',u:'dB(A)',v:'70'},{s:'Lmid',n:'中型车贡献',u:'dB(A)',v:'65'},{s:'Lsml',n:'小型车贡献',u:'dB(A)',v:'60'}],calc:v=>10*Math.log10(Math.pow(10,0.1*v.Lbig)+Math.pow(10,0.1*v.Lmid)+Math.pow(10,0.1*v.Lsml)),unit:'dB(A)'},
{id:'train_eq',cat:'噪声预测',n:'列车通过的等效时间（近似计算）',law:'HJ 2.4',latex:'t_{eq,i}=\\frac{l}{v}(1+0.8\\cdot\\frac{l}{d})',vars:[{s:'l',n:'列车长度',u:'m',v:'120'},{s:'v',n:'运行速度',u:'m/s',v:'20'},{s:'d',n:'预测距离',u:'m',v:'30'}],calc:v=>v.l/v.v*(1+0.8*v.l/v.d),unit:'s'},
{id:'train_eq2',cat:'噪声预测',n:'列车通过的等效时间（精确计算）',law:'HJ 2.4',latex:'t_{eq,i}=\\frac{l_i}{v_i}\\cdot\\frac{2\\arctan(2d/l_i)+\\frac{4d^2+l_i^2}{4dl_i}}{\\pi}',vars:[{s:'li',n:'列车长度',u:'m',v:'120'},{s:'vi',n:'运行速度',u:'m/s',v:'20'},{s:'d',n:'预测距离',u:'m',v:'30'}],calc:v=>v.li/v.vi*(2*Math.atan(2*v.d/v.li)+(4*v.d*v.d+v.li*v.li)/(4*v.d*v.li))/Math.PI,unit:'s'},
{id:'train_rail',cat:'噪声预测',n:'列车运行噪声几何发散衰减（铁路、地铁、旋转电机）',law:'HJ 2.4',latex:'A_{t,div}=10\\lg\\frac{\\frac{4d_0^2+l^2}{4l}\\arctan(\\frac{2d}{l})+\\frac{d_0}{1}\\arctan(\\frac{2d_0}{l})}{\\frac{4d^2+l^2}{4l}\\arctan(\\frac{2d}{l})+\\frac{d}{1}\\arctan(\\frac{2d}{l})}',vars:[{s:'d0',n:'参考距离',u:'m',v:'7.5'},{s:'d',n:'预测距离',u:'m',v:'30'},{s:'l',n:'列车长度',u:'m',v:'120'}],calc:v=>10*Math.log10(v.d0/v.d),unit:'dB'},
{id:'train_maglev',cat:'噪声预测',n:'列车运行噪声几何发散衰减（地铁、轻轨、中低速磁浮）',law:'HJ 2.4',latex:'A_{t,div}=10\\lg\\frac{d_0\\arctan(2d/l)}{d\\arctan(2d_0/l)}',vars:[{s:'d0',n:'参考距离',u:'m',v:'7.5'},{s:'d',n:'预测距离',u:'m',v:'30'},{s:'l',n:'列车长度',u:'m',v:'120'}],calc:v=>10*Math.log10(v.d0*Math.atan(2*v.d/v.l)/(v.d*Math.atan(2*v.d0/v.l))),unit:'dB'},
{id:'airport',cat:'噪声预测',n:'机场航空器噪声事件的有效感觉噪声级',law:'HJ 2.4',latex:'L_{EPN}=L_{A\\max}+10\\lg(\\frac{T}{20})+13',vars:[{s:'LAmax',n:'最大A声级',u:'dB(A)',v:'90'},{s:'T',n:'持续时间',u:'s',v:'30'}],calc:v=>v.LAmax+10*Math.log10(v.T/20)+13,unit:'dB'},

// === 应急预案 ===
{id:'q_calc',cat:'应急预案',n:'危险物质数量与临界量比值',law:'HJ 941',latex:'Q=\\frac{Q_1}{q_1}',vars:[{s:'Q1',n:'危险物质数量',u:'t',v:'10'},{s:'q1',n:'临界量',u:'t',v:'50'}],calc:v=>v.Q1/v.q1,unit:''},
{id:'sub_crit',cat:'应急预案',n:'次临界流流出系数计算',law:'HJ 169',latex:'Y=\\left[\\frac{P}{P_0}\\right]^{\\frac{1}{\\gamma}}\\cdot\\left\\{1-\\left[\\frac{P}{P_0}\\right]^{\\frac{\\gamma-1}{\\gamma}}\\right\\}^{\\frac{1}{2}}\\cdot\\left\\{\\frac{2}{\\gamma-1}\\cdot\\left[\\frac{2}{\\gamma+1}\\right]^{\\frac{\\gamma+1}{\\gamma-1}}\\right\\}^{\\frac{1}{2}}',vars:[{s:'P',n:'容器内压力',u:'Pa',v:'200000'},{s:'P0',n:'大气压力',u:'Pa',v:'101325'},{s:'gamma',n:'绝热指数γ',u:'',v:'1.4'}],calc:v=>{let r=v.P/v.P0;return Math.pow(r,1/v.gamma)*Math.sqrt(1-Math.pow(r,(v.gamma-1)/v.gamma))*Math.sqrt(2/(v.gamma-1)*Math.pow(2/(v.gamma+1),(v.gamma+1)/(v.gamma-1)))},unit:''},
{id:'two_phase_density',cat:'应急预案',n:'两相混合物的平均密度计算',law:'HJ 169',latex:'\\rho_m=\\frac{1}{\\frac{F_v}{\\rho_1}+\\frac{1-F_V}{\\rho_2}}',vars:[{s:'Fv',n:'闪蒸比例',u:'',v:'0.3'},{s:'rho1',n:'气相密度',u:'kg/m³',v:'2'},{s:'rho2',n:'液相密度',u:'kg/m³',v:'1000'}],calc:v=>1/(v.Fv/v.rho1+(1-v.Fv)/v.rho2),unit:'kg/m³'},
{id:'flash_ratio',cat:'应急预案',n:'泄漏液体的闪蒸比例',law:'HJ 169',latex:'F_v=\\frac{C_P(T_T-T_b)}{H_v}',vars:[{s:'CP',n:'液体比热',u:'kJ/(kg·K)',v:'2'},{s:'TT',n:'液体温度',u:'K',v:'350'},{s:'Tb',n:'沸点',u:'K',v:'300'},{s:'Hv',n:'汽化热',u:'kJ/kg',v:'300'}],calc:v=>v.CP*(v.TT-v.Tb)/v.Hv,unit:''},
{id:'pollutant_time',cat:'应急预案',n:'污染物到达最近的受体点的时间计算',law:'HJ 169',latex:'T=\\frac{2X}{U_r}',vars:[{s:'X',n:'距离',u:'m',v:'1000'},{s:'Ur',n:'风速',u:'m/s',v:'2.5'}],calc:v=>2*v.X/v.Ur,unit:'s'},
{id:'cont_dyn',cat:'应急预案',n:'连续排放的流体动力学参数计算',law:'HJ 169',latex:'R_i=\\frac{U_r\\left[\\frac{D_{rel}\\cdot g(\\rho_{rel}-\\rho_a)/\\rho_a}{Q}\\cdot(\\frac{\\rho_{rel}-\\rho_a}{\\rho_a})\\right]^{1/3}}{U_r^2}',vars:[{s:'Ur',n:'风速',u:'m/s',v:'2.5'},{s:'Drel',n:'释放直径',u:'m',v:'0.1'},{s:'rhoR',n:'释放物密度',u:'kg/m³',v:'2'},{s:'rhoA',n:'空气密度',u:'kg/m³',v:'1.2'},{s:'Q',n:'释放速率',u:'kg/s',v:'0.5'}],calc:v=>{let g=9.81;return v.Ur*Math.pow(v.Drel*g*((v.rhoR-v.rhoA)/v.rhoA)/v.Q*((v.rhoR-v.rhoA)/v.rhoA),1/3)/(v.Ur*v.Ur)},unit:''},
{id:'leak_liquid',cat:'应急预案',n:'液体泄漏速率',law:'HJ 169',latex:'Q_L=C_dA\\rho\\sqrt{\\frac{2(P-P_0)}{\\rho}+2gh}',vars:[{s:'Cd',n:'泄漏系数',u:'',v:'0.65'},{s:'A',n:'裂口面积',u:'m²',v:'0.0001'},{s:'rho',n:'液体密度',u:'kg/m³',v:'1000'},{s:'P',n:'容器内压',u:'Pa',v:'200000'},{s:'P0',n:'大气压',u:'Pa',v:'101325'},{s:'h',n:'液位高度',u:'m',v:'5'}],calc:v=>v.Cd*v.A*v.rho*Math.sqrt(2*(v.P-v.P0)/v.rho+2*9.81*v.h),unit:'kg/s'},
{id:'leak_gas',cat:'应急预案',n:'理想气体泄漏速率计算',law:'HJ 169',latex:'Q_G=YC_dAP\\sqrt{\\frac{M\\gamma}{RT_G}\\left(\\frac{\\gamma+1}{2}\\right)^{\\frac{\\gamma-1}{\\gamma+1}}}',vars:[{s:'Y',n:'流出系数',u:'',v:'1'},{s:'Cd',n:'泄漏系数',u:'',v:'0.65'},{s:'A',n:'裂口面积',u:'m²',v:'0.0001'},{s:'P',n:'容器内压',u:'Pa',v:'500000'},{s:'M',n:'分子量',u:'g/mol',v:'17'},{s:'gamma',n:'绝热指数',u:'',v:'1.4'},{s:'T',n:'温度',u:'K',v:'293'}],calc:v=>v.Y*v.Cd*v.A*v.P*Math.sqrt(v.M*v.gamma/(8.314*v.T)*Math.pow((v.gamma+1)/2,(v.gamma-1)/(v.gamma+1))),unit:'kg/s'},
{id:'leak_two',cat:'应急预案',n:'两相流泄漏速率',law:'HJ 169',latex:'Q_{LG}=C_dA\\sqrt{2\\rho_m(P-P_C)}',vars:[{s:'Cd',n:'泄漏系数',u:'',v:'0.65'},{s:'A',n:'裂口面积',u:'m²',v:'0.0001'},{s:'rhoM',n:'混合密度',u:'kg/m³',v:'500'},{s:'P',n:'容器内压',u:'Pa',v:'500000'},{s:'PC',n:'临界压力',u:'Pa',v:'101325'}],calc:v=>v.Cd*v.A*Math.sqrt(2*v.rhoM*(v.P-v.PC)),unit:'kg/s'},
{id:'evap_ratio',cat:'应急预案',n:'蒸发的液体占液体总量的比例',law:'HJ 169',latex:'F_V=\\frac{C_P(T_L-T_C)}{H}',vars:[{s:'CP',n:'液体比热',u:'kJ/(kg·K)',v:'2'},{s:'TL',n:'液体泄漏温度',u:'K',v:'350'},{s:'TC',n:'液体沸点',u:'K',v:'300'},{s:'H',n:'汽化热',u:'kJ/kg',v:'300'}],calc:v=>v.CP*(v.TL-v.TC)/v.H,unit:''},
{id:'flash_evap',cat:'应急预案',n:'过热液体闪蒸蒸发速率估算',law:'HJ 169',latex:'Q_1=Q_L\\cdot F_v',vars:[{s:'QL',n:'液体泄漏速率',u:'kg/s',v:'5'},{s:'Fv',n:'闪蒸比例',u:'',v:'0.3'}],calc:v=>v.QL*v.Fv,unit:'kg/s'},
{id:'instant_dyn',cat:'应急预案',n:'瞬时排放流体动力学参数计算',law:'HJ 169',latex:'R_i=\\frac{U_r^2\\left(\\frac{g(Q_t(\\rho_{rel}/\\rho_a))}{U_r^2}\\right)^{1/3}\\cdot\\left(\\frac{\\rho_{rel}-\\rho_a}{\\rho_a}\\right)}{U_r^2}',vars:[{s:'Ur',n:'风速',u:'m/s',v:'2.5'},{s:'Qt',n:'瞬时释放量',u:'kg',v:'100'},{s:'rhoR',n:'释放物密度',u:'kg/m³',v:'2'},{s:'rhoA',n:'空气密度',u:'kg/m³',v:'1.2'}],calc:v=>{let g=9.81;return Math.pow(g*v.Qt*(v.rhoR/v.rhoA)/(v.Ur*v.Ur),1/3)*((v.rhoR-v.rhoA)/v.rhoA)},unit:''},
{id:'heat_evap',cat:'应急预案',n:'热量蒸发估算',law:'HJ 169',latex:'Q_2=\\frac{\\lambda S(T_0-T_b)}{H\\sqrt{\\pi\\alpha t}}',vars:[{s:'lam',n:'导热系数',u:'W/(m·K)',v:'0.6'},{s:'S',n:'液池面积',u:'m²',v:'10'},{s:'T0',n:'环境温度',u:'K',v:'300'},{s:'Tb',n:'沸点',u:'K',v:'250'},{s:'H',n:'汽化热',u:'kJ/kg',v:'300'},{s:'alpha',n:'热扩散系数',u:'m²/s',v:'1.5e-7'},{s:'t',n:'时间',u:'s',v:'600'}],calc:v=>v.lam*v.S*(v.T0-v.Tb)/(v.H*1000*Math.sqrt(Math.PI*v.alpha*v.t)),unit:'kg/s'},
{id:'mass_evap',cat:'应急预案',n:'质量蒸发估算',law:'HJ 169',latex:'Q_3=\\alpha p\\cdot\\frac{M}{RT_0}\\cdot u^{\\frac{(2+n)}{(2-n)}}\\cdot r^{\\frac{(2+n)}{(4+n)}}',vars:[{s:'alpha',n:'系数α',u:'',v:'0.005'},{s:'p',n:'蒸汽压',u:'Pa',v:'5000'},{s:'M',n:'分子量',u:'g/mol',v:'18'},{s:'T0',n:'温度',u:'K',v:'293'},{s:'u',n:'风速',u:'m/s',v:'2.5'},{s:'r',n:'液池半径',u:'m',v:'5'},{s:'n',n:'大气稳定度',u:'',v:'0.25'}],calc:v=>v.alpha*v.p*v.M/(8.314*v.T0)*Math.pow(v.u,(2+v.n)/(2-v.n))*Math.pow(v.r,(2+v.n)/(4+v.n)),unit:'kg/s'},
{id:'total_evap',cat:'应急预案',n:'液体蒸发总量的计算',law:'HJ 169',latex:'W_p=Q_1t_1+Q_2t_2+Q_3t_3',vars:[{s:'Q1',n:'闪蒸速率',u:'kg/s',v:'1.5'},{s:'t1',n:'闪蒸时间',u:'s',v:'60'},{s:'Q2',n:'热量蒸化速率',u:'kg/s',v:'0.5'},{s:'t2',n:'热量蒸化时间',u:'s',v:'600'},{s:'Q3',n:'质量蒸化速率',u:'kg/s',v:'0.1'},{s:'t3',n:'质量蒸发时间',u:'s',v:'3600'}],calc:v=>v.Q1*v.t1+v.Q2*v.t2+v.Q3*v.t3,unit:'kg'},
{id:'accident_pool',cat:'应急预案',n:'事故缓冲设施总有效容积（事故应急池）',law:'HJ 169',latex:'V_{\\text{总}}=(V_1+V_2-V_3)+V_4+V_5',vars:[{s:'V1',n:'最大物料量',u:'m³',v:'50'},{s:'V2',n:'消防水量',u:'m³',v:'200'},{s:'V3',n:'可转输量',u:'m³',v:'50'},{s:'V4',n:'初期雨水量',u:'m³',v:'30'},{s:'V5',n:'其他水量',u:'m³',v:'10'}],calc:v=>v.V1+v.V2-v.V3+v.V4+v.V5,unit:'m³'},

// === 其他类型 ===
{id:'active_carbon_m',cat:'其他类型',n:'活性炭重量计算',law:'物料衡算',latex:'G=\\phi\\cdot T\\cdot n\\cdot L\\cdot l,\\ F=V\\div3600\\div v,\\ L=F/l',vars:[{s:'phi',n:'密度',u:'kg/m³',v:'450'},{s:'T',n:'数量',u:'个',v:'4'},{s:'n',n:'层数',u:'',v:'1'},{s:'V',n:'风量',u:'m³/h',v:'10000'},{s:'v',n:'空塔速度',u:'m/s',v:'0.3'},{s:'l',n:'单层厚度',u:'m',v:'0.3'}],calc:v=>{let F=v.V/3600/v.v,L=F/v.l;return v.phi*v.T*v.n*L*v.l},unit:'kg'},
{id:'active_carbon_t',cat:'其他类型',n:'活性炭更换周期',law:'物料衡算',latex:'T=m\\cdot s\\div(c\\cdot10^{-6}\\cdot Q\\cdot t)',vars:[{s:'m',n:'装填量',u:'kg',v:'500'},{s:'s',n:'吸附容量',u:'%',v:'10'},{s:'c',n:'进口浓度',u:'mg/m³',v:'200'},{s:'Q',n:'风量',u:'m³/h',v:'10000'},{s:'t',n:'年运行时间',u:'h/a',v:'4800'}],calc:v=>v.m*v.s/100/(v.c*1e-6*v.Q*v.t)/24,unit:'d'},
{id:'active_carbon_res',cat:'其他类型',n:'活性炭停留时间',law:'物料衡算',latex:'t=T\\cdot n\\div v',vars:[{s:'T',n:'单层厚度',u:'m',v:'0.3'},{s:'n',n:'层数',u:'',v:'1'},{s:'v',n:'空塔速度',u:'m/s',v:'0.3'}],calc:v=>v.T*v.n/v.v,unit:'s'},
{id:'active_carbon_cycle',cat:'其他类型',n:'活性炭周期算用量',law:'物料衡算',latex:'M=T\\cdot(\\frac{10^6}{c}\\cdot Q\\cdot t)\\div s',vars:[{s:'T',n:'更换周期',u:'d',v:'90'},{s:'c',n:'进口浓度',u:'mg/m³',v:'200'},{s:'Q',n:'风量',u:'m³/h',v:'10000'},{s:'t',n:'日运行时间',u:'h/d',v:'16'},{s:'s',n:'吸附容量',u:'%',v:'10'}],calc:v=>v.T*(1e6/v.c*v.Q*v.t)/(v.s/100)/1000,unit:'kg/周期'},
{id:'qhd_dust',cat:'其他类型',n:'秦皇岛码头煤堆起尘量计算',law:'经验公式',latex:'Q_p=2.1K\\times(U-U_0)^3\\times e^{-1.023w}\\times P',vars:[{s:'K',n:'系数',u:'',v:'1'},{s:'U',n:'风速',u:'m/s',v:'5'},{s:'U0',n:'起动风速',u:'m/s',v:'3'},{s:'w',n:'含水率',u:'%',v:'5'},{s:'P',n:'煤堆表面积',u:'m²',v:'500'}],calc:v=>2.1*v.K*Math.pow(v.U-v.U0,3)*Math.exp(-1.023*v.w)*v.P,unit:'mg/s'},

let selectedId = null;
function init() {
  const cats = [...new Set(FORMULAS.map(f=>f.cat))].sort();
  document.getElementById('catFilter').innerHTML = '<option value="">全部分类</option>' + cats.map(c=>`<option value="${c}">${c}</option>`).join('');
  renderList();
}
function renderList() {
  const q = (document.getElementById('searchInput')?.value||'').toLowerCase();
  const cat = document.getElementById('catFilter')?.value||'';
  let items = FORMULAS;
  if (q) items = items.filter(f=>f.n.toLowerCase().includes(q)||f.cat.includes(q)||f.law.toLowerCase().includes(q));
  if (cat) items = items.filter(f=>f.cat===cat);
  let html = '', lastCat = '';
  for (const f of items) {
    if (f.cat !== lastCat) { html += `<div style="font-size:11px;color:var(--muted);padding:8px 4px 4px;font-weight:800;">${f.cat}</div>`; lastCat = f.cat; }
    html += `<div class="panel-soft" style="padding:8px 10px;cursor:pointer;${f.id===selectedId?'border:1px solid var(--accent);background:#f0fdfa;':''}" onclick="selectFormula('${f.id}')"><div style="font-size:13px;font-weight:700;color:#0f172a;">${f.n}</div><div class="text-muted text-xs mt-1">${f.law}</div></div>`;
  }
  if (!items.length) html = '<div class="text-muted text-sm text-center p-4">未找到匹配的公式</div>';
  document.getElementById('formulaList').innerHTML = html;
}
function selectFormula(id) {
  selectedId = id; renderList();
  const f = FORMULAS.find(x=>x.id===id);
  if (!f) return;
  let latexHtml = ''; try { latexHtml = katex.renderToString(f.latex, {displayMode:true}); } catch(e) { latexHtml = f.latex; }
  let varHtml = f.vars.map(inp => `<tr><td style="font-weight:600;">${inp.n}</td><td style="font-family:monospace;color:var(--accent-dark);">${inp.s}</td><td><input class="input" id="dv_${inp.s}" type="number" step="any" value="${inp.v}" style="width:100%;min-height:30px;font-size:13px;"></td><td class="text-muted text-xs">${inp.u}</td></tr>`).join('');
  document.getElementById('detailPanel').innerHTML = `<div style="margin-bottom:12px;"><span class="badge badge-uploaded">${f.cat}</span><span class="text-muted text-xs ml-2">${f.law}</span></div><div class="font-semibold mb-3" style="font-size:18px;color:#0f172a;">${f.n}</div><div class="panel-soft" style="padding:16px;margin-bottom:16px;text-align:center;overflow-x:auto;">${latexHtml}</div>${f.desc?`<div class="text-muted text-sm mb-2">${f.desc}</div>`:''}<table class="table" style="margin-bottom:12px;"><thead><tr><th>变量名</th><th>符号</th><th>输入值</th><th>单位</th></tr></thead><tbody>${varHtml}</tbody></table><button class="btn btn-primary" onclick="doCalc()"><i class="fas fa-calculator"></i> 计算</button><div id="calcResult" class="mt-3"></div>`;
}
function doCalc() {
  const f = FORMULAS.find(x=>x.id===selectedId);
  if (!f) return;
  const vals = {};
  for (const inp of f.vars) vals[inp.s] = parseFloat(document.getElementById('dv_'+inp.s)?.value) || 0;
  try {
    const result = f.calc(vals);
    let html = '<table class="table"><thead><tr><th>项目</th><th>结果</th><th>单位</th></tr></thead><tbody>';
    if (Array.isArray(result)) { for (const r of result) html += `<tr><td style="font-weight:600;">${r[0]}</td><td style="font-weight:700;color:var(--accent-dark);">${r[1]}</td><td>${f.unit||''}</td></tr>`; }
    else html += `<tr><td style="font-weight:600;">${f.n}</td><td style="font-weight:700;color:var(--accent-dark);">${result}</td><td>${f.unit||''}</td></tr>`;
    html += '</tbody></table>';
    document.getElementById('calcResult').innerHTML = html;
  } catch(e) { document.getElementById('calcResult').innerHTML = '<span class="text-p0">计算错误: '+e.message+'</span>'; }
}
init();
</script>
