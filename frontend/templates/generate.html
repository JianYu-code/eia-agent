{% extends "base.html" %}
{% block content %}
<div class="page-title">智能生成报告</div>
<div class="page-subtitle">填写项目信息或上传可研文件，AI 逐章生成 → 11 步自审核 → 自动修复，交付"出厂体检"级初稿</div>

<form id="genForm" onsubmit="doGenerate(event)" style="max-width:900px;">
  <div class="panel mb-3" style="border:1px dashed #93c5fd;background:#eff6ff;">
    <div class="flex items-center justify-between">
      <div>
        <div class="font-semibold" style="color:#1d4ed8;"><i class="fas fa-file-arrow-up"></i> 可研/设计文件自动填表</div>
        <div class="text-muted text-sm mt-1">上传 DOCX/PDF 可研或设计文件，AI 自动提取项目信息填入下方表单（可再修改）</div>
      </div>
      <div>
        <input type="file" id="proposalFile" accept=".docx,.pdf,.md,.txt" style="display:none;" onchange="doParseProposal()">
        <button type="button" class="btn btn-primary btn-sm" onclick="document.getElementById('proposalFile').click()"><i class="fas fa-upload"></i>上传可研文件</button>
      </div>
    </div>
    <div id="proposalStatus" class="text-sm mt-2"></div>
  </div>

  <div class="panel mb-3">
    <div class="font-semibold mb-2" style="font-size:15px;color:#0f172a;">项目基本信息</div>
    <div class="grid grid-2 gap-3">
      <div><label class="text-muted text-sm">项目名称 *</label><input class="input" id="gen_name" placeholder="如：XX公司生物质锅炉建设项目" required></div>
      <div><label class="text-muted text-sm">建设单位</label><input class="input" id="gen_company" placeholder="如：XX有限公司"></div>
      <div><label class="text-muted text-sm">建设地点</label><input class="input" id="gen_location" placeholder="如：XX省XX市XX县"></div>
      <div><label class="text-muted text-sm">建设性质</label><select class="input" id="gen_nature"><option>新建</option><option>改建</option><option>扩建</option><option>技术改造</option></select></div>
      <div><label class="text-muted text-sm">行业类别</label><input class="input" id="gen_industry" placeholder="如：热力生产和供应业 D4430"></div>
      <div><label class="text-muted text-sm">报告类型</label><select class="input" id="gen_report_type"><option>报告书</option><option>报告表</option></select></div>
      <div><label class="text-muted text-sm">总投资（万元）</label><input class="input" id="gen_investment" type="number" placeholder="500"></div>
      <div><label class="text-muted text-sm">用地面积（m²）</label><input class="input" id="gen_area" type="number" placeholder="5000"></div>
      <div><label class="text-muted text-sm">环境功能区划</label><input class="input" id="gen_envfunc" placeholder="如：二类环境空气质量功能区、2类声环境功能区"></div>
      <div><label class="text-muted text-sm">周边敏感目标</label><input class="input" id="gen_sensitive" placeholder="如：厂界外500m范围内无居民区、学校等敏感点"></div>
    </div>
  </div>

  <div class="panel mb-3">
    <div class="font-semibold mb-2" style="font-size:15px;color:#0f172a;">工程概况</div>
    <div><label class="text-muted text-sm">工程概述 *</label><textarea class="input" id="gen_overview" rows="3" placeholder="简要描述项目建设内容和规模。如：本项目新建1台2.5t/h生物质热水锅炉，配套建设除尘、脱硫、脱硝设施，为原有养鸡场提供冬季供暖..." required></textarea></div>
    <div class="grid grid-2 gap-3 mt-2">
      <div><label class="text-muted text-sm">主要原辅材料</label><textarea class="input" id="gen_materials" rows="2" placeholder="如：生物质成型燃料 2000t/a、氧化钙 50t/a、尿素 10t/a..."></textarea></div>
      <div><label class="text-muted text-sm">主要设备</label><textarea class="input" id="gen_equipment" rows="2" placeholder="如：2.5t/h链条式生物质锅炉、陶瓷多管除尘器、布袋除尘器、SNCR脱硝装置..."></textarea></div>
    </div>
    <div class="mt-2"><label class="text-muted text-sm">工艺流程简述</label><textarea class="input" id="gen_process" rows="3" placeholder="如：生物质燃料→上料系统→锅炉燃烧→烟气→多管除尘器→布袋除尘器→脱硫塔→脱硝→烟囱排放..."></textarea></div>
  </div>

  <div class="panel mb-3">
    <div class="font-semibold mb-2" style="font-size:15px;color:#0f172a;">污染源及治理措施</div>
    <div class="grid grid-2 gap-3">
      <div><label class="text-muted text-sm">废气污染源及治理措施</label><textarea class="input" id="gen_air" rows="3" placeholder="如：锅炉烟气（颗粒物、SO₂、NOₓ、汞及其化合物），经多管除尘+布袋除尘（效率99.5%）+氧化钙脱硫（效率90%）+SNCR脱硝（效率40%）后由35m烟囱排放..."></textarea></div>
      <div><label class="text-muted text-sm">废水污染源及治理措施</label><textarea class="input" id="gen_water" rows="3" placeholder="如：锅炉循环水排水和软化处理废水，全部回用于灰渣增湿和厂区洒水降尘，不外排..."></textarea></div>
      <div><label class="text-muted text-sm">固废产生及处置</label><textarea class="input" id="gen_solid" rows="2" placeholder="如：灰渣外售综合利用，废离子交换树脂（HW13）由厂家更换时回收..."></textarea></div>
      <div><label class="text-muted text-sm">噪声源及控制措施</label><textarea class="input" id="gen_noise" rows="2" placeholder="如：鼓风机、引风机、泵类等设备噪声，采取隔声、减振、厂房屏蔽等措施..."></textarea></div>
    </div>
  </div>

  <div class="panel-soft mb-3">
    <label class="text-muted text-sm">补充说明（上述信息未覆盖的其他内容）</label>
    <textarea class="input" id="gen_notes" rows="2" placeholder="如：项目不涉及自然保护区、水源保护区等生态敏感区；煤质分析参数（硫分0.5%、灰分8%）；锅炉年运行时间300天..." style="margin-top:4px;"></textarea>
  </div>

  <div class="flex items-center gap-3">
    <button type="submit" class="btn btn-primary" id="genBtn"><i class="fas fa-wand-magic-sparkles"></i>开始生成报告</button>
    <span class="text-muted text-sm">生成+自审核约需 5-10 分钟，请耐心等待</span>
  </div>
  <div id="genStatus" class="mt-3"></div>
</form>
{% endblock %}
{% block scripts %}
<script>
const FIELD_MAP = {
  name:'gen_name', company:'gen_company', location:'gen_location', nature:'gen_nature',
  industry:'gen_industry', investment:'gen_investment', area:'gen_area',
  overview:'gen_overview', materials:'gen_materials', process:'gen_process',
  equipment:'gen_equipment', air_pollution:'gen_air', water_pollution:'gen_water',
  solid_waste:'gen_solid', noise:'gen_noise', sensitive_targets:'gen_sensitive',
  env_function:'gen_envfunc',
};

async function doParseProposal() {
  const f = document.getElementById('proposalFile').files[0];
  if (!f) return;
  const st = document.getElementById('proposalStatus');
  st.innerHTML = '<span class="text-muted"><i class="fas fa-circle-notch fa-spin"></i> 正在解析可研文件，提取项目信息...</span>';
  try {
    const fd = new FormData();
    fd.append('file', f);
    const resp = await fetch('/api/generate/parse-proposal', {method:'POST', body: fd});
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.detail || '解析失败');
    let filled = 0;
    for (const [k, elId] of Object.entries(FIELD_MAP)) {
      const v = (data.fields||{})[k];
      if (v) {
        const el = document.getElementById(elId);
        if (el) { el.value = v; filled++; }
      }
    }
    st.innerHTML = `<span class="text-success"><i class="fas fa-check-circle"></i> 已从「${esc(data.filename)}」提取 ${filled} 个字段，请核对修改后开始生成</span>`;
  } catch(e) {
    st.innerHTML = `<span class="text-p0"><i class="fas fa-exclamation-circle"></i> ${esc(e.message)}</span>`;
  }
}

async function doGenerate(e) {
  e.preventDefault();
  const btn = document.getElementById('genBtn');
  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> 生成中...';

  const getVal = id => document.getElementById(id).value.trim();
  const body = {
    name: getVal('gen_name'), company: getVal('gen_company'),
    location: getVal('gen_location'), nature: getVal('gen_nature'),
    industry: getVal('gen_industry'), investment: getVal('gen_investment'),
    area: getVal('gen_area'), overview: getVal('gen_overview'),
    materials: getVal('gen_materials'), process: getVal('gen_process'),
    equipment: getVal('gen_equipment'), air_pollution: getVal('gen_air'),
    water_pollution: getVal('gen_water'), solid_waste: getVal('gen_solid'),
    noise: getVal('gen_noise'), sensitive_targets: getVal('gen_sensitive'),
    env_function: getVal('gen_envfunc'), notes: getVal('gen_notes'),
    report_type: getVal('gen_report_type') || '报告书',
  };

  try {
    const data = await api('/api/generate', {method:'POST',body:JSON.stringify(body)});
    const pid = data.project_id;
    sessionStorage.setItem('gen_project_id', pid);
    sessionStorage.setItem('gen_status', 'running');
    window.addEventListener('beforeunload', beforeUnloadWarn);
    renderProgress(pid);
    pollProject(pid, btn);
  } catch(e) {
    document.getElementById('genStatus').innerHTML = '<span class="text-p0">'+e.message+'</span>';
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-wand-magic-sparkles"></i>开始生成报告';
  }
}

function renderProgress(pid) {
  document.getElementById('genStatus').innerHTML = `<div class="panel-soft p-3">
    <div class="font-semibold" style="color:#0f172a;">双闭环进行中：生成 → 自审核 → 修复</div>
    <div class="text-muted text-sm mt-1">项目ID: ${pid}</div>
    <div class="progress-track mt-2"><div class="progress-bar" id="genProgressBar" style="width:0;"></div></div>
    <div class="text-muted text-sm mt-2" id="genStep">启动生成...</div>
    <div id="genLogs" class="text-muted text-xs mt-2" style="max-height:160px;overflow-y:auto;font-family:monospace;"></div>
    <div id="genResult" class="mt-3 hidden"></div>
  </div>`;
}

function renderDone(pid, p) {
  const s = p.result_summary || {};
  const gradeColor = {A:'#10b981',B:'#3b82f6',C:'#f59e0b',D:'#ef4444'}[s.grade]||'#64748b';
  const el = document.getElementById('genResult');
  el.classList.remove('hidden');
  el.innerHTML = `
    <div style="border:1px solid #e2e8f0;border-radius:10px;padding:14px;background:#fff;">
      <div class="flex items-center gap-3">
        <div style="font-size:34px;font-weight:900;color:${gradeColor};">${s.grade||'-'}</div>
        <div>
          <div class="font-semibold" style="color:#0f172a;">生成完成 · 自审核质量评级 ${s.grade||''}</div>
          <div class="text-muted text-sm">P0:${s.p0_count||0} P1:${s.p1_count||0} P2:${s.p2_count||0}${s.repair_rounds?` · 自动修复 ${s.repair_rounds} 轮`:''}</div>
          ${s.summary?`<div class="text-muted text-sm mt-1">${esc(s.summary)}</div>`:''}
        </div>
      </div>
      <div class="flex gap-2 mt-3 flex-wrap">
        <a href="/api/generate/${pid}/download" class="btn btn-green btn-sm"><i class="fas fa-download"></i>Markdown</a>
        <a href="/api/generate/${pid}/download-docx" class="btn btn-green btn-sm"><i class="fas fa-download"></i>DOCX</a>
        <a href="/api/projects/${pid}/report/view" target="_blank" class="btn btn-primary btn-sm"><i class="fas fa-file-shield"></i>自审核报告</a>
      </div>
      <div class="text-muted text-xs mt-2">⚠ 残留问题多为占位数据（【待补】），请工程师核实替换后使用。自审核报告可查看全部问题与修复记录。</div>
    </div>`;
}

function pollProject(pid, btn) {
  let lastLogCount = 0;
  let intv = setInterval(async () => {
    try {
      const pd = await api('/api/projects');
      const p = (pd.projects||[]).find(x => x.id === pid);
      if (!p) return;
      document.getElementById('genProgressBar').style.width = (p.progress||0)+'%';
      document.getElementById('genStep').textContent = p.step || '';
      const logs = p.logs||[];
      if (logs.length > lastLogCount) {
        const box = document.getElementById('genLogs');
        box.innerHTML = logs.slice(-12).map(l => `<div>[${l.time||''}] ${esc(l.message||'')}</div>`).join('');
        box.scrollTop = box.scrollHeight;
        lastLogCount = logs.length;
      }
      if (p.status === 'completed') {
        clearInterval(intv);
        clearGenState();
        renderDone(pid, p);
        btn.disabled = false; btn.innerHTML = '<i class="fas fa-wand-magic-sparkles"></i>开始生成报告';
      } else if (p.status === 'failed') {
        clearInterval(intv);
        clearGenState();
        document.getElementById('genStep').innerHTML = '<span class="text-p0">失败: '+esc(p.step||'')+'</span>';
        btn.disabled = false; btn.innerHTML = '<i class="fas fa-wand-magic-sparkles"></i>开始生成报告';
      }
    } catch(e) {}
  }, 3000);
}

function beforeUnloadWarn(e) {
  if (sessionStorage.getItem('gen_status') === 'running') {
    e.preventDefault();
  }
}

function clearGenState() {
  sessionStorage.removeItem('gen_project_id');
  sessionStorage.removeItem('gen_status');
  window.removeEventListener('beforeunload', beforeUnloadWarn);
}

async function restoreGenState() {
  const pid = sessionStorage.getItem('gen_project_id');
  const status = sessionStorage.getItem('gen_status');
  if (!pid || status !== 'running') return;
  renderProgress(pid);
  const btn = document.getElementById('genBtn');
  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> 生成中...';
  window.addEventListener('beforeunload', beforeUnloadWarn);
  pollProject(pid, btn);
}

function esc(s) { return (s||'').replace(/</g,'&lt;'); }
restoreGenState();
</script>
{% endblock %}
